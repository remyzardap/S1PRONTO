# ─── Sutaeru S1PRONTO — Docker Compose ───
# For local development or standalone deployment

services:
  app:
    build: .
    container_name: sutaeru-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sutaeru-net

  db:
    image: postgres:16-alpine
    container_name: sutaeru-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sutaeru}
      POSTGRES_USER: ${POSTGRES_USER:-sutaeru}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sutaeru}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sutaeru-net

volumes:
  pgdata:
    driver: local

networks:
  sutaeru-net:
    driver: bridge
